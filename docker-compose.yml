services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syndicateclaw-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: syndicateclaw
      POSTGRES_PASSWORD: syndicateclaw
      POSTGRES_DB: syndicateclaw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syndicateclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - syndicateclaw-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - syndicateclaw-net

volumes:
  pgdata:
  redisdata:

networks:
  syndicateclaw-net:
    driver: bridge
