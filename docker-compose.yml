services:
  app:
    build: .
    command: ["sh", "-c", "python -m alembic upgrade head && python scripts/seed_rbac_phase0.py && exec uvicorn syndicateclaw.api.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw
      SYNDICATECLAW_REDIS_URL: redis://redis:6379/0
      SYNDICATECLAW_ENVIRONMENT: development
      SYNDICATECLAW_SECRET_KEY: dev-only-change-in-production
      SYNDICATECLAW_LOG_LEVEL: debug
      # Local first-value mode only. Production must leave RBAC enforcement enabled.
      SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syndicateclaw-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: syndicateclaw
      POSTGRES_PASSWORD: syndicateclaw
      POSTGRES_DB: syndicateclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syndicateclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - syndicateclaw-net

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - syndicateclaw-net

volumes:
  pgdata:
  redisdata:

networks:
  syndicateclaw-net:
    driver: bridge
