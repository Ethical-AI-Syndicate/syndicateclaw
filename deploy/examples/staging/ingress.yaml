apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syndicateclaw
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: customer-ingress
  rules:
    - host: claw.staging.example.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syndicateclaw
                port:
                  number: 8000
