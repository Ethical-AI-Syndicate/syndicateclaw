apiVersion: apps/v1
kind: Deployment
metadata:
  name: syndicateclaw
  labels:
    app.kubernetes.io/name: syndicateclaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: syndicateclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syndicateclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate
          image: REGISTRY_IMAGE:TAG
          command: ["python", "-m", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
            - secretRef:
                name: syndicateclaw-secrets
        - name: seed-rbac
          image: REGISTRY_IMAGE:TAG
          command: ["python", "scripts/seed_rbac_phase0.py"]
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
            - secretRef:
                name: syndicateclaw-secrets
      containers:
        - name: app
          image: REGISTRY_IMAGE:TAG
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
            - secretRef:
                name: syndicateclaw-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
