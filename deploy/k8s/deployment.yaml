apiVersion: apps/v1
kind: Deployment
metadata:
  name: syndicateclaw
  labels:
    app.kubernetes.io/name: syndicateclaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: syndicateclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syndicateclaw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: REGISTRY_IMAGE:TAG
          command: ["python", "-m", "alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
          env:
            - name: SYNDICATECLAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_DATABASE_URL
            - name: SYNDICATECLAW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_REDIS_URL
            - name: SYNDICATECLAW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_SECRET_KEY
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: seed-rbac
          image: REGISTRY_IMAGE:TAG
          command: ["python", "scripts/seed_rbac_phase0.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
          env:
            - name: SYNDICATECLAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_DATABASE_URL
            - name: SYNDICATECLAW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_REDIS_URL
            - name: SYNDICATECLAW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_SECRET_KEY
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: app
          image: REGISTRY_IMAGE:TAG
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: syndicateclaw-config
          env:
            - name: SYNDICATECLAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_DATABASE_URL
            - name: SYNDICATECLAW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_REDIS_URL
            - name: SYNDICATECLAW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: syndicateclaw-secrets
                  key: SYNDICATECLAW_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
