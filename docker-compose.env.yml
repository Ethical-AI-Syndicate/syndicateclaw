# On-demand environment orchestration for SyndicateClaw
#
# Usage:
#   docker compose -f docker-compose.env.yml up -d syndicateclaw-<env>
#
# Environments:
#   dev       — lightweight, debug logging, no auth enforcement
#   qa        — test data seeded, separate DB, verbose audit
#   perf      — resource-constrained, profiling enabled
#   staging   — production mirror, enforcement on, signed audit
#
# Registry: registry.mikeholownych.com

x-base: &base
  build: .
  image: registry.mikeholownych.com/ai-syndicate/syndicateclaw:${IMAGE_TAG:-latest}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - syndicateclaw-net
  volumes:
    - ./scripts:/scripts:ro

# ─── Dev ────────────────────────────────────────────────
syndicateclaw-dev:
  <<: *base
  container_name: syndicateclaw-dev
  ports:
    - "8001:8000"
  environment:
    SYNDICATECLAW_ENVIRONMENT: development
    SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw_dev
    SYNDICATECLAW_REDIS_URL: redis://redis:6379/1
    SYNDICATECLAW_SECRET_KEY: dev-secret-not-for-production
    SYNDICATECLAW_LOG_LEVEL: DEBUG
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
  volumes:
    - dev-logs:/var/log/syndicateclaw

# ─── QA ─────────────────────────────────────────────────
syndicateclaw-qa:
  <<: *base
  container_name: syndicateclaw-qa
  ports:
    - "8002:8000"
  environment:
    SYNDICATECLAW_ENVIRONMENT: qa
    SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw_qa
    SYNDICATECLAW_REDIS_URL: redis://redis:6379/2
    SYNDICATECLAW_SECRET_KEY: qa-secret-change-before-use
    SYNDICATECLAW_LOG_LEVEL: DEBUG
    SYNDICATECLAW_AUDIT_LOG_ALL: "true"
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
  depends_on:
    - syndicateclaw-dev  # wait for shared postgres
  volumes:
    - qa-logs:/var/log/syndicateclaw

# ─── Perf ───────────────────────────────────────────────
syndicateclaw-perf:
  <<: *base
  container_name: syndicateclaw-perf
  ports:
    - "8003:8000"
  environment:
    SYNDICATECLAW_ENVIRONMENT: perf
    SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw_perf
    SYNDICATECLAW_REDIS_URL: redis://redis:6379/3
    SYNDICATECLAW_SECRET_KEY: perf-secret-change-before-use
    SYNDICATECLAW_LOG_LEVEL: WARNING
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "true"
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.5"
        memory: 256M
  volumes:
    - perf-logs:/var/log/syndicateclaw

# ─── Staging ────────────────────────────────────────────
syndicateclaw-staging:
  <<: *base
  container_name: syndicateclaw-staging
  ports:
    - "8004:8000"
  environment:
    SYNDICATECLAW_ENVIRONMENT: staging
    SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:syndicateclaw@postgres:5432/syndicateclaw_staging
    SYNDICATECLAW_REDIS_URL: redis://redis:6379/4
    SYNDICATECLAW_SECRET_KEY: ${STAGING_SECRET_KEY}
    SYNDICATECLAW_LOG_LEVEL: INFO
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "true"
    SYNDICATECLAW_REQUIRE_ASYMMETRIC_SIGNING: "false"
  volumes:
    - staging-logs:/var/log/syndicateclaw

# ─── Load Testing (perf companion) ─────────────────────
locust:
  container_name: syndicateclaw-locust
  image: locustio/locust:2.32
  ports:
    - "8089:8089"
  volumes:
    - ./tests/perf:/mnt/locust
  command: -f /mnt/locust/locustfile.py --host=http://syndicateclaw-perf:8000
  networks:
    - syndicateclaw-net
  depends_on:
    - syndicateclaw-perf

# ─── Shared Services ────────────────────────────────────
postgres:
  image: postgres:16
  container_name: syndicateclaw-postgres
  environment:
    POSTGRES_USER: syndicateclaw
    POSTGRES_PASSWORD: syndicateclaw
    POSTGRES_DBS: "syndicateclaw_dev,syndicateclaw_qa,syndicateclaw_perf,syndicateclaw_staging"
  ports:
    - "5432:5432"
  volumes:
    - pgdata:/var/lib/postgresql/data
    - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U syndicateclaw"]
    interval: 5s
    timeout: 5s
    retries: 5
  networks:
    - syndicateclaw-net

redis:
  image: redis:7-alpine
  container_name: syndicateclaw-redis
  ports:
    - "6379:6379"
  volumes:
    - redisdata:/data
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 5s
    retries: 5
  networks:
    - syndicateclaw-net

volumes:
  pgdata:
  redisdata:
  dev-logs:
  qa-logs:
  perf-logs:
  staging-logs:

networks:
  syndicateclaw-net:
    driver: bridge
