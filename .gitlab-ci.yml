include:
  - project: 'ai-syndicate/ci-templates'
    ref: main
    file: '/templates/governance-semantics.yml'

stages:
  - validate
  - test
  - security
  - build
  - release_gate
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

default:
  interruptible: true
  timeout: 30m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

variables:
  SEMGREP_CI_IMAGE: "registry.mikeholownych.com/ai-syndicate/syndicateclaw/semgrep:1.91.0"
  TRIVY_CI_IMAGE: "registry.mikeholownych.com/ai-syndicate/syndicateclaw/trivy:0.56.2"
  K8S_CI_IMAGE: "registry.mikeholownych.com/ai-syndicate/syndicateclaw/alpine-k8s:1.31.1"
  DEBIAN_FRONTEND: "noninteractive"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_DEFAULT_TIMEOUT: "120"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_PREFER_BINARY: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "20"
  FF_NETWORK_PER_BUILD: "1"

  POSTGRES_DB: syndicateclaw_test
  POSTGRES_USER: syndicateclaw
  POSTGRES_PASSWORD: syndicateclaw

  SYNDICATECLAW_DATABASE_URL: "postgresql+asyncpg://syndicateclaw:syndicateclaw@localhost:5432/syndicateclaw_test"
  SYNDICATECLAW_TEST_DATABASE_URL: "postgresql+asyncpg://syndicateclaw:syndicateclaw@localhost:5432/syndicateclaw_test"
  SYNDICATECLAW_REDIS_URL: "redis://localhost:6379/0"

cache:
  key:
    files:
      - pyproject.toml
      - requirements.txt
  paths:
    - .cache/pip
  policy: pull-push

.python_base_job: &python_base_job
  image: python:3.12-slim
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends build-essential gcc git libpq-dev python3-dev curl
    - rm -rf /var/lib/apt/lists/*
    - python -V
    - python -m pip install --upgrade pip wheel setuptools
    - pip install --prefer-binary -e ".[dev]"

.python_db_job: &python_db_job
  image: python:3.12-slim
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends build-essential gcc git libpq-dev python3-dev postgresql redis-server curl
    - rm -rf /var/lib/apt/lists/*
    - service postgresql start
    - service redis-server start
    - until su - postgres -c "pg_isready -h localhost -p 5432 >/dev/null 2>&1"; do sleep 1; done
    - su - postgres -c "psql -c \"ALTER SYSTEM SET max_connections = 200;\""
    - service postgresql restart
    - until su - postgres -c "pg_isready -h localhost -p 5432 >/dev/null 2>&1"; do sleep 1; done
    - su - postgres -c "psql -c \"CREATE USER syndicateclaw WITH PASSWORD 'syndicateclaw';\""
    - su - postgres -c "psql -c \"CREATE DATABASE syndicateclaw_test OWNER syndicateclaw;\""
    - python -V
    - python -m pip install --upgrade pip wheel setuptools
    - pip install --prefer-binary -e ".[dev]"

.rules_mr_or_main: &rules_mr_or_main
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

.rules_main_or_tag: &rules_main_or_tag
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

.rules_runtime_changes: &rules_runtime_changes
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      changes:
        - src/syndicateclaw/runtime/**/*
        - tests/runtime/**/*
        - pyproject.toml
        - .gitlab-ci.yml
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - src/syndicateclaw/runtime/**/*
        - tests/runtime/**/*
        - pyproject.toml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/syndicateclaw/runtime/**/*
        - tests/runtime/**/*
        - pyproject.toml
        - .gitlab-ci.yml

.rules_migration_changes: &rules_migration_changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      changes:
        - migrations/**/*
        - alembic.ini
        - src/syndicateclaw/db/**/*
        - src/syndicateclaw/models.py
        - .gitlab-ci.yml
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - migrations/**/*
        - alembic.ini
        - src/syndicateclaw/db/**/*
        - src/syndicateclaw/models.py
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - migrations/**/*
        - alembic.ini
        - src/syndicateclaw/db/**/*
        - src/syndicateclaw/models.py
        - .gitlab-ci.yml

.rules_container_build_changes: &rules_container_build_changes
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

.rules_schedule_only: &rules_schedule_only
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

enterprise_readiness_check:
  stage: validate
  image: alpine:3.20
  script:
    - ./scripts/enterprise-readiness-check.sh
  <<: *rules_mr_or_main

ci_image_governance_advisory:
  stage: validate
  image: alpine:3.20
  allow_failure: true
  script:
    - apk add --no-cache bash git
    - git clone --depth 1 --branch ci-image-governance-advisory-v0.1.0 https://gitlab.mikeholownych.com/ai-syndicate/ci-templates.git /tmp/ci-templates
    - ROOT_DIR="$CI_PROJECT_DIR" bash /tmp/ci-templates/scripts/check-ci-images.sh "$CI_PROJECT_DIR"
  <<: *rules_mr_or_main

security_review_check:
  stage: validate
  extends: .python_base_job
  script:
    - ./scripts/security-review-check.sh
  <<: *rules_mr_or_main

validate:
  stage: validate
  extends: .python_base_job
  script:
    - ruff check src tests
    - ruff format --check src tests
    - mypy src
  artifacts:
    when: always
    expire_in: 7 days
  <<: *rules_mr_or_main

# Release/deploy gating policy check (SDD-GOV-SIGNTAG-001 follow-up;
# [claw-release-flow-gating]). Statically proves that no release-cutting,
# tag-creating, or deploy job can run AUTOMATICALLY on an ordinary main push.
# It only parses .gitlab-ci.yml and evaluates rule `if:` expressions under the
# ordinary-main-push environment; it NEVER runs a release or a deploy. Fails the
# pipeline closed if a release/deploy job would auto-run on an ordinary main push.
"validate:release-deploy-gating":
  stage: validate
  image: python:3.12-slim
  needs: []
  before_script:
    - set -euo pipefail
    - python -m pip install --upgrade pip
    - pip install --prefer-binary "pyyaml>=6"
  script:
    - python3 scripts/ci/check_release_deploy_gating.py --selftest
    - python3 scripts/ci/check_release_deploy_gating.py --file .gitlab-ci.yml
  <<: *rules_mr_or_main

release_provenance_check:
  stage: validate
  extends: .python_base_job
  before_script:
    - apt-get update -qq && apt-get install -y -qq git gnupg
  script:
    - python3 scripts/release/generate_release_manifest.py
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        python3 scripts/release/verify_release_provenance.py --require-signed
      else
        python3 scripts/release/verify_release_provenance.py
      fi
  artifacts:
    paths:
      - release_manifest.json
    expire_in: 30 days
  <<: *rules_mr_or_main

unit_tests:
  stage: test
  extends: .python_base_job
  resource_group: ci-cpu-bound
  needs: ["validate"]
  script:
    - PYTHONPATH=src pytest tests/unit -q --tb=short --cov=src/syndicateclaw --cov-branch --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage.xml
    expire_in: 14 days
  <<: *rules_mr_or_main

integration_tests:
  stage: test
  extends: .python_db_job
  resource_group: ci-db-bound
  needs: ["validate"]
  variables:
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
  script:
    - PYTHONPATH=src pytest tests/integration -m integration -q --tb=line --junitxml=integration-junit.xml
  artifacts:
    when: always
    reports:
      junit: integration-junit.xml
    expire_in: 14 days
  <<: *rules_mr_or_main

runtime_contract_schemas:
  stage: test
  image: python:3.12-slim
  resource_group: ci-cpu-bound
  needs: ["validate"]
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends build-essential gcc git libpq-dev
    - rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip wheel setuptools
    - pip install --prefer-binary -e ".[dev]"
  script:
    - ruff check src/syndicateclaw/runtime tests/runtime
    - mypy src/syndicateclaw/runtime
    - python -m syndicateclaw.runtime.contracts.export_schemas
    - pytest tests/runtime/ -q --tb=line --junitxml=runtime-junit.xml
    - git diff --exit-code -- src/syndicateclaw/runtime/contracts/jsonschema/
  artifacts:
    when: always
    reports:
      junit: runtime-junit.xml
    expire_in: 14 days
  <<: *rules_runtime_changes

migration_check:
  stage: test
  extends: .python_db_job
  resource_group: ci-db-bound
  allow_failure: false
  needs: ["validate"]
  script:
    - |
      python - <<'PY'
      import asyncio
      import os

      from alembic import command
      from alembic.config import Config
      from sqlalchemy.ext.asyncio import create_async_engine
      from sqlalchemy.pool import NullPool

      import syndicateclaw.db  # noqa: F401 - ensures all SQLAlchemy models are registered
      from syndicateclaw.db.base import Base

      database_url = os.environ["SYNDICATECLAW_DATABASE_URL"]

      async def rebuild_schema() -> None:
          engine = create_async_engine(database_url, future=True, poolclass=NullPool)
          try:
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.drop_all)
                  await conn.run_sync(Base.metadata.create_all)
          finally:
              await engine.dispose()

      asyncio.run(rebuild_schema())

      alembic_cfg = Config("alembic.ini")
      alembic_cfg.set_main_option("sqlalchemy.url", database_url)
      command.stamp(alembic_cfg, "head")
      PY
    - python -m alembic check
  <<: *rules_migration_changes

bandit_and_audit:
  stage: security
  extends: .python_base_job
  needs: ["validate"]
  script:
    - pip install bandit pip-audit
    - bandit -r src/ -ll -x tests -f json -o bandit_report.json
    - pip-audit -f json -o audit_report.json || true
    - python scripts/check_audit_gates.py audit_report.json bandit_report.json
  artifacts:
    when: always
    paths:
      - bandit_report.json
      - audit_report.json
    expire_in: 30 days
  <<: *rules_mr_or_main

semgrep_scan:
  stage: security
  image: ${SEMGREP_CI_IMAGE}
  needs: ["validate"]
  before_script:
    - set -euo pipefail
  script:
    - semgrep scan --config auto --json --output semgrep_report.json src/
    - |
      python - <<'PY'
      import json
      import sys

      with open("semgrep_report.json", encoding="utf-8") as f:
          report = json.load(f)

      results = report.get("results", [])
      blocking = [
          r for r in results
          if r.get("extra", {}).get("severity") == "ERROR"
      ]
      count = len(blocking)
      print(f"Blocking semgrep findings: {count}")
      sys.exit(1 if count > 0 else 0)
      PY
  artifacts:
    when: always
    paths:
      - semgrep_report.json
    expire_in: 30 days
  <<: *rules_mr_or_main

sbom_generate:
  stage: security
  image: python:3.12-slim
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends curl ca-certificates git
    - rm -rf /var/lib/apt/lists/*
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin || true
  script:
    - ./scripts/generate-sbom.sh
  artifacts:
    when: always
    paths:
      - sbom.spdx.json
    expire_in: 30 days
  <<: *rules_mr_or_main

dependency_audit:
  stage: security
  image: python:3.12-slim
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends git nodejs npm
    - rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install pip-audit || true
  script:
    - ./scripts/dependency-audit.sh
  artifacts:
    when: always
    paths:
      - dependency-audit-report.json
      - pip-audit.json
      - pip-audit.stderr
      - npm-audit-*.json
    expire_in: 30 days
  <<: *rules_mr_or_main

provenance_evidence:
  stage: security
  image: alpine:3.20
  before_script:
    - apk add --no-cache coreutils git
  script:
    - ./scripts/generate-provenance-evidence.sh
  artifacts:
    when: always
    paths:
      - provenance-evidence.json
    expire_in: 90 days
  <<: *rules_mr_or_main

preprod_release_gate:
  stage: release_gate
  image: alpine:3.20
  needs:
    - enterprise_readiness_check
    - unit_tests
    - job: integration_tests
      optional: true
    - job: migration_check
      optional: true
    - sbom_generate
    - dependency_audit
    - provenance_evidence
    - job: docker_build
      optional: true
    - job: container_scan
      optional: true
  script:
    - ./scripts/release-gate-check.sh preprod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
  allow_failure: false

prod_release_gate:
  stage: release_gate
  image: alpine:3.20
  needs:
    - enterprise_readiness_check
    - unit_tests
    - job: integration_tests
      optional: true
    - job: migration_check
      optional: true
    - sbom_generate
    - dependency_audit
    - provenance_evidence
    - job: docker_build
      optional: true
    - job: container_scan
      optional: true
  script:
    - ./scripts/release-gate-check.sh prod
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
  allow_failure: false

docker_build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false"]
  resource_group: ci-image-bound
  needs:
    - job: unit_tests
    - job: integration_tests
    - job: migration_check
      optional: true
    - job: runtime_contract_schemas
      optional: true
    - job: bandit_and_audit
    - job: semgrep_scan
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: plain
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  before_script:
    - set -euo pipefail
    - |
      docker_ready=false
      for i in $(seq 1 60); do
        if docker info > /dev/null 2>&1; then
          docker_ready=true
          break
        fi
        echo "Waiting for Docker daemon..."
        sleep 2
      done
      if [ "${docker_ready}" != "true" ]; then
        echo "ERROR: Docker daemon was not ready after waiting."
        exit 1
      fi
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      if [ -n "${CI_DEPENDENCY_PROXY_SERVER:-}" ] && [ -n "${CI_DEPENDENCY_PROXY_USER:-}" ] && [ -n "${CI_DEPENDENCY_PROXY_PASSWORD:-}" ]; then
        echo "$CI_DEPENDENCY_PROXY_PASSWORD" | docker login -u "$CI_DEPENDENCY_PROXY_USER" --password-stdin "$CI_DEPENDENCY_PROXY_SERVER"
      fi
    - docker pull "$CI_REGISTRY_IMAGE:latest" || true
  script:
    - |
      PYTHON_IMAGE="python:3.14.3-alpine3.22"
      if [ -n "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX:-}" ]; then
        PYTHON_IMAGE="${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/python:3.14.3-alpine3.22"
      fi
      docker build --pull \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg PYTHON_IMAGE="$PYTHON_IMAGE" \
        --cache-from "$CI_REGISTRY_IMAGE:latest" \
        -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - |
      if [ "${CI_COMMIT_BRANCH:-}" = "main" ]; then
        docker tag "$IMAGE_TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  <<: *rules_container_build_changes

container_scan:
  stage: build
  resource_group: ci-image-bound
  image:
    name: ${TRIVY_CI_IMAGE}
    entrypoint: [""]
  needs:
    - docker_build
  before_script:
    - set -euo pipefail
  script:
    - trivy image --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD" --exit-code 1 --severity HIGH,CRITICAL --no-progress "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  <<: *rules_container_build_changes

provider_integration_tests:
  stage: security
  extends: .python_db_job
  resource_group: ci-db-bound
  needs:
    - unit_tests
    - integration_tests
  variables:
    SYNDICATECLAW_CI_PROVIDER_TESTS: "true"
  secrets:
    OPENAI_API_KEY:
      vault: ci/syndicateclaw/openai_api_key@secret
    ANTHROPIC_API_KEY:
      vault: ci/syndicateclaw/anthropic_api_key@secret
  script:
    - |
      if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${ANTHROPIC_API_KEY:-}" ]; then
        printf '%s\n' "Provider API keys not available; skipping provider integration tests on this runner."
        printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<testsuite name="provider_integration_tests" tests="1" failures="0" errors="0" skipped="1" time="0">' \
          '  <testcase classname="provider_integration_tests" name="requires_api_keys" time="0">' \
          '    <skipped message="OPENAI_API_KEY and/or ANTHROPIC_API_KEY unavailable"/>' \
          '  </testcase>' \
          '</testsuite>' \
          > provider-junit.xml
        exit 0
      fi
    - pytest tests/ -m requires_api_keys -q --tb=short --junitxml=provider-junit.xml
  artifacts:
    when: always
    reports:
      junit: provider-junit.xml
    expire_in: 14 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

benchmark:
  stage: test
  extends: .python_db_job
  resource_group: ci-db-bound
  script:
    - pip install pytest-benchmark
    - pytest tests/perf/test_smoke_benchmark.py --benchmark-only --benchmark-json=benchmark.json -q
    - python scripts/check_benchmark_regression.py benchmark.json tests/perf/baseline_v2.0.0.json
  artifacts:
    when: always
    paths:
      - benchmark.json
    expire_in: 30 days
  <<: *rules_schedule_only

chaos_tests:
  stage: test
  extends: .python_db_job
  resource_group: ci-db-bound
  script:
    - pytest tests/chaos/ -m chaos -v --tb=short
  <<: *rules_schedule_only

pentest:
  stage: test
  extends: .python_db_job
  resource_group: ci-db-bound
  variables:
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends build-essential gcc git libpq-dev python3-dev postgresql redis-server curl
    - rm -rf /var/lib/apt/lists/*
    - service postgresql start
    - service redis-server start
    - until su - postgres -c "pg_isready -h localhost -p 5432 >/dev/null 2>&1"; do sleep 1; done
    - su - postgres -c "psql -c \"ALTER SYSTEM SET max_connections = 200;\""
    - service postgresql restart
    - until su - postgres -c "pg_isready -h localhost -p 5432 >/dev/null 2>&1"; do sleep 1; done
    - su - postgres -c "psql -c \"CREATE USER syndicateclaw WITH PASSWORD 'syndicateclaw';\""
    - su - postgres -c "psql -c \"CREATE DATABASE syndicateclaw_test OWNER syndicateclaw;\""
    - python -V
    - python -m pip install --upgrade pip wheel setuptools
    - pip install --prefer-binary -e ".[dev]"
    - pip install -e ./sdk
  script:
    - pytest tests/security/ -m pentest -v --tb=short
  <<: *rules_schedule_only

mutation_test:
  stage: test
  extends: .python_db_job
  timeout: 120m
  script:
    - mutmut run || MUTMUT_RC=$?
    - export MUTMUT_RC=${MUTMUT_RC:-0}
    - mutmut results 2>/dev/null | tee mutation_results.txt || true
    - |
      python - <<'PY'
      import os, pathlib, sys

      mutmut_rc = int(os.environ.get("MUTMUT_RC", "0"))
      if mutmut_rc > 1:
          print(f"mutmut crashed (exit {mutmut_rc}); failing CI.", file=sys.stderr)
          sys.exit(1)

      text = pathlib.Path("mutation_results.txt").read_text(encoding="utf-8")
      survived = text.count("Survived")
      print(f"Survived mutations: {survived} (mutmut exit {mutmut_rc})")
      sys.exit(1 if survived > 10 else 0)
      PY
  artifacts:
    when: always
    paths:
      - mutation_results.txt
    expire_in: 30 days
  <<: *rules_schedule_only

deploy_staging:
  stage: deploy
  image: ${K8S_CI_IMAGE}
  needs:
    - docker_build
    - container_scan
  resource_group: syndicateclaw-staging
  variables:
    KUBE_NAMESPACE: syndicateclaw-staging
  before_script:
    - set -euo pipefail
  script:
    - |
      if ! kubectl config current-context >/dev/null 2>&1; then
        echo "Kubernetes credentials are not configured; skipping staging deploy."
        exit 0
      fi
    - kubectl set image deployment/syndicateclaw app=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n $KUBE_NAMESPACE
    - kubectl rollout status deployment/syndicateclaw -n $KUBE_NAMESPACE --timeout=300s
    - bash scripts/smoke_test.sh https://staging.syndicateclaw.dev
  environment:
    name: staging
    url: https://staging.syndicateclaw.dev
  rules:
    # Staging deploy must NOT run automatically on ordinary main pushes. It
    # requires an explicit, operator-initiated context: a web-triggered pipeline
    # with DEPLOY_STAGING == "true", and is still manual + non-blocking.
    # [claw-release-flow-gating]
    - if: '$CI_PIPELINE_SOURCE == "web" && $DEPLOY_STAGING == "true"'
      when: manual
      allow_failure: true
    - when: never

deploy_production:
  stage: deploy
  image: ${K8S_CI_IMAGE}
  needs:
    - docker_build
    - container_scan
  resource_group: syndicateclaw-production
  variables:
    KUBE_NAMESPACE: syndicateclaw-production
  before_script:
    - set -euo pipefail
  script:
    - |
      if ! kubectl config current-context >/dev/null 2>&1; then
        echo "Kubernetes credentials are not configured; skipping production deploy."
        exit 0
      fi
    - kubectl set image deployment/syndicateclaw app=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n $KUBE_NAMESPACE
    - kubectl rollout status deployment/syndicateclaw -n $KUBE_NAMESPACE --timeout=300s
  environment:
    name: production
    url: https://api.syndicateclaw.dev
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success

release:
  stage: deploy
  image: node:20.18.0-slim
  # Image-build jobs do not run in a web-triggered release pipeline, so they are
  # optional needs: the signed-tag + provenance flow does not depend on them.
  needs:
    - job: docker_build
      optional: true
    - job: container_scan
      optional: true
  variables:
    GIT_SSL_NO_VERIFY: "true"
  before_script:
    - set -euo pipefail
    - apt-get update -o Acquire::Retries=3
    - apt-get install -y --no-install-recommends git gnupg python3
    - rm -rf /var/lib/apt/lists/*
  script:
    # Signed-release flow (SDD-GOV-SIGNTAG-001, Option B): semantic-release
    # computes the version from conventional commits; scripts/release/
    # create_signed_tag.py creates the annotated GPG-SIGNED release tag; the
    # manifest is generated and verified under --require-signed; only then is the
    # tag pushed. A release is signed or it does not happen. See
    # docs/release/SIGNED_RELEASE_FLOW.md.
    - |
      set -euo pipefail
      # Fail closed: a release MUST be signed. No key material => no release.
      if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_KEY_ID:-}" ]; then
        echo "Signing material (GPG_PRIVATE_KEY/GPG_KEY_ID) absent; refusing to cut an unsigned release. Failing closed."
        exit 1
      fi
      export GNUPGHOME="$(mktemp -d)"; chmod 700 "$GNUPGHOME"
      cleanup() { gpgconf --kill all >/dev/null 2>&1 || true; rm -rf "$GNUPGHOME" >/dev/null 2>&1 || true; }
      trap cleanup EXIT
      printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
      # --- secret-sensitive: import key + stage passphrase, never echoed ---
      set +x
      import_key() {
        if [ -f "$GPG_PRIVATE_KEY" ]; then gpg --batch --import "$GPG_PRIVATE_KEY" >/dev/null 2>/tmp/imp.err && return 0; fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%s'    "$GPG_PRIVATE_KEY" | base64 -d 2>/dev/null | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%b'    "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        return 1
      }
      if ! import_key; then echo "GPG private key import failed."; exit 1; fi
      : "${GPG_PASSPHRASE:=}"
      printf '%s' "$GPG_PASSPHRASE" > "$GNUPGHOME/pp"; chmod 600 "$GNUPGHOME/pp"
      printf '#!/bin/sh\nexec gpg --pinentry-mode loopback --passphrase-file "%s/pp" --batch --no-tty "$@"\n' "$GNUPGHOME" > "$GNUPGHOME/gpgwrap.sh"
      chmod 700 "$GNUPGHOME/gpgwrap.sh"
      # --- end secret-sensitive ---
    - npm install --no-save
        semantic-release@24
        @semantic-release/commit-analyzer
        @semantic-release/release-notes-generator
        @semantic-release/exec
        @semantic-release/changelog
        @semantic-release/git
    - |
      set -euo pipefail
      # Version determination only (no tag/commit/push): semantic-release --dry-run.
      VERSION="$(npx --no-install semantic-release --dry-run 2>/dev/null | sed -n 's/.*next release version is \([0-9][0-9.]*\).*/\1/p' | head -1)"
      if [ -z "$VERSION" ]; then
        echo "semantic-release determined no release is due; nothing to release."
        exit 0
      fi
      echo "Next release version: v$VERSION"
      # Create the annotated SIGNED release tag (authorized release context).
      python3 scripts/release/create_signed_tag.py \
        --tag "v$VERSION" --key-id "$GPG_KEY_ID" \
        --gpg-program "$GNUPGHOME/gpgwrap.sh" \
        --expected-key-id "$GPG_KEY_ID" \
        --allow-release-tag \
        --message "release v$VERSION"
      git verify-tag "v$VERSION"
      # Generate + verify the signed provenance manifest under full signed mode.
      python3 scripts/release/generate_release_manifest.py --tag "v$VERSION" --out release_manifest.json --require-signing
      python3 scripts/release/verify_release_provenance.py --manifest release_manifest.json --repo-path . --require-signed --expected-key-id "$GPG_KEY_ID"
      # Authorized push: this is the ONLY mutation that leaves CI, and only here.
      git push origin "refs/tags/v$VERSION"
  rules:
    # Releases are NOT cut on ordinary main pushes. The flow creates a signed tag
    # and pushes it, so it must only run in an explicit, operator-initiated
    # release context: a web-triggered pipeline with RELEASE == "true". This
    # prevents a stray fix:/feat: merge from auto-cutting a release tag (e.g.
    # the unintended lightweight v2.2.10). [claw-release-flow-gating]
    - if: '$CI_PIPELINE_SOURCE == "web" && $RELEASE == "true"'
      when: on_success
    - when: never

# Phase 3 positive signing dry-run (SDD-GATE-SIGNING-001).
# Proves a real, protected GPG key can sign the release manifest
# non-interactively in CI and that the signature verifies. Runs as a MANUAL job
# on the protected default branch (main), where the protected GPG_* variables
# are exposed. It does NOT create a tag,
# does NOT deploy, and does NOT require a signed tag. An unsigned result fails
# the job closed via --require-signing. Key material and passphrase are never
# echoed; the ephemeral GNUPGHOME is always removed.
release_manifest_signing_dry_run:
  stage: validate
  image: python:3.12-alpine
  needs: []
  before_script:
    - apk add --no-cache git gnupg
  script:
    - |
      set -e
      if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
        echo "GPG_PRIVATE_KEY is not exposed on this ref (protected variable)."
        echo "This signing dry-run must run on a protected branch/ref; failing closed."
        exit 1
      fi
      export GNUPGHOME="$(mktemp -d)"
      chmod 700 "$GNUPGHOME"
      cleanup() { gpgconf --kill all >/dev/null 2>&1 || true; rm -rf "$GNUPGHOME"; }
      trap cleanup EXIT
      printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
      # --- secret-sensitive: import key without ever echoing it. Tolerate the
      #     common CI storage formats (raw armored, base64, or backslash-n
      #     escaped) so the proof does not depend on how the variable was set. ---
      set +x
      import_key() {
        if [ -f "$GPG_PRIVATE_KEY" ]; then
          gpg --batch --import "$GPG_PRIVATE_KEY" >/dev/null 2>/tmp/imp.err && return 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%s'    "$GPG_PRIVATE_KEY" | base64 -d 2>/dev/null | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%b'    "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        return 1
      }
      if ! import_key; then
        echo "GPG private key import failed (tried raw, base64, and escaped forms)."
        echo "Sanitized gpg stderr (key/base64 lines stripped):"
        grep -av -E 'BEGIN|END|^[A-Za-z0-9+/=]{16,}$' /tmp/imp.err 2>/dev/null | tail -8 || true
        exit 1
      fi
      # --- end secret-sensitive ---
      echo "Imported secret key id(s) (public info):"
      gpg --list-secret-keys --keyid-format=long 2>/dev/null | awk '/^sec/{print "  "$2}'
      # Generator reads GPG_KEY_ID + GPG_PASSPHRASE from env; --require-signing
      # makes an unsigned result fail the job instead of passing silently.
      python3 scripts/release/generate_release_manifest.py --out signed_manifest.json --require-signing
      # Verifier enforces signature + algorithm + (env GPG_KEY_ID) signer match.
      # Advisory on the tag (no signed tag required for a dry-run).
      python3 scripts/release/verify_release_provenance.py --manifest signed_manifest.json --repo-path . > signing_verification.json || true
      cat signing_verification.json
      python3 -c "import json,sys; d=json.load(open('signing_verification.json')); ok = d.get('manifest_signature_verified') is True and d.get('signature_algorithm')=='gpg' and not d.get('errors'); print('SIGNING DRY-RUN:', 'PASS' if ok else 'FAIL', '| signer_key_id=', d.get('signer_key_id')); sys.exit(0 if ok else 1)"
  artifacts:
    paths:
      - signing_verification.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true


# Signed-tag dry-run (SDD-GOV-SIGNTAG-001).
# Proves the FULL --require-signed path verifies BOTH a signed release manifest
# AND an annotated signed tag, using the real protected GPG key. It creates a
# LOCAL-ONLY, non-release, non-semver annotated signed tag, generates a signed
# manifest bound to that tag, and runs the verifier in full signed mode
# (--require-signed + --expected-key-id). The tag is NEVER pushed (asserted
# against origin) and is deleted in a cleanup trap. This job does NOT create a
# release tag, does NOT push, and does NOT deploy. It is MANUAL on the protected
# default branch (main), where GPG_* protected variables are exposed; on any
# other ref it fails closed because the protected key is absent. Key material and
# passphrase are never echoed; the ephemeral GNUPGHOME is always removed.
release_signed_tag_dry_run:
  stage: validate
  image: python:3.12-alpine
  needs: []
  before_script:
    - apk add --no-cache git gnupg
  script:
    - |
      set -e
      if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
        echo "GPG_PRIVATE_KEY is not exposed on this ref (protected variable)."
        echo "This signed-tag dry-run must run on a protected branch/ref; failing closed."
        exit 1
      fi
      if [ -z "${GPG_KEY_ID:-}" ]; then
        echo "GPG_KEY_ID is required to assert the tag signer identity; failing closed."
        exit 1
      fi
      export GNUPGHOME="$(mktemp -d)"
      chmod 700 "$GNUPGHOME"
      TAG="provenance-ci-test/${CI_PIPELINE_ID:-local}/${CI_COMMIT_SHORT_SHA:-nohead}"
      cleanup() {
        git tag -d "$TAG" >/dev/null 2>&1 || true
        gpgconf --kill all >/dev/null 2>&1 || true
        rm -rf "$GNUPGHOME" >/dev/null 2>&1 || true
      }
      trap cleanup EXIT
      printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
      # --- secret-sensitive: import key + stage passphrase, never echoed ---
      set +x
      import_key() {
        if [ -f "$GPG_PRIVATE_KEY" ]; then
          gpg --batch --import "$GPG_PRIVATE_KEY" >/dev/null 2>/tmp/imp.err && return 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%s'    "$GPG_PRIVATE_KEY" | base64 -d 2>/dev/null | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        printf '%b'    "$GPG_PRIVATE_KEY" | gpg --batch --import >/dev/null 2>>/tmp/imp.err && return 0
        return 1
      }
      if ! import_key; then
        echo "GPG private key import failed (tried raw, base64, and escaped forms)."
        echo "Sanitized gpg stderr (key/base64 lines stripped):"
        grep -av -E 'BEGIN|END|^[A-Za-z0-9+/=]{16,}$' /tmp/imp.err 2>/dev/null | tail -8 || true
        exit 1
      fi
      : "${GPG_PASSPHRASE:=}"
      printf '%s' "$GPG_PASSPHRASE" > "$GNUPGHOME/pp"
      chmod 600 "$GNUPGHOME/pp"
      printf '#!/bin/sh\nexec gpg --pinentry-mode loopback --passphrase-file "$GNUPGHOME/pp" --batch --no-tty "$@"\n' > "$GNUPGHOME/gpgwrap.sh"
      chmod 700 "$GNUPGHOME/gpgwrap.sh"
      # --- end secret-sensitive ---
      echo "Imported secret key id(s) (public info):"
      gpg --list-secret-keys --keyid-format=long 2>/dev/null | awk '/^sec/{print "  "$2}'
      # Create a LOCAL-ONLY, non-release, non-semver annotated SIGNED tag.
      git config gpg.program "$GNUPGHOME/gpgwrap.sh"
      git -c user.email="release-ci@local" -c user.name="release-ci" \
          -c user.signingkey="$GPG_KEY_ID" \
          tag -s -m "signed-tag provenance dry-run (local-only, never pushed)" "$TAG"
      echo "Created local annotated signed tag: $TAG"
      git verify-tag "$TAG"
      # Generate a signed manifest bound to the tag, then verify in FULL signed mode.
      python3 scripts/release/generate_release_manifest.py --tag "$TAG" --out signed_tag_manifest.json --require-signing
      python3 scripts/release/verify_release_provenance.py --manifest signed_tag_manifest.json --repo-path . --require-signed --expected-key-id "$GPG_KEY_ID" > signed_tag_verification.json || true
      cat signed_tag_verification.json
      # Assert the temp tag was NOT pushed to origin (must be absent).
      if [ -n "$(git ls-remote --tags origin "refs/tags/$TAG" 2>/dev/null)" ]; then
        echo "FATAL: temp tag unexpectedly present on origin"; exit 1
      fi
      echo "Confirmed: $TAG is absent on origin (never pushed)."
      python3 -c "import json,sys,os; d=json.load(open('signed_tag_verification.json')); kid=os.environ.get('GPG_KEY_ID','').upper().replace(' ',''); ts=str(d.get('tag_signer_key_id') or '').upper().replace(' ',''); keym=bool(ts) and (ts.endswith(kid) or kid.endswith(ts)); ok=d.get('status')=='pass' and d.get('signed_tag_verified') is True and d.get('manifest_signature_verified') is True and keym and not d.get('errors'); print('SIGNED-TAG DRY-RUN:', 'PASS' if ok else 'FAIL', '| signed_tag_verified=', d.get('signed_tag_verified'), '| manifest_signature_verified=', d.get('manifest_signature_verified'), '| tag_signer=', d.get('tag_signer_key_id')); sys.exit(0 if ok else 1)"
  artifacts:
    paths:
      - signed_tag_verification.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true


# Signed-release FLOW dry-run (SDD-GOV-SIGNTAG-001 follow-up).
# Proves the syndicateclaw signed-release path end-to-end using a THROWAWAY GPG
# key generated in-job — so it needs NO protected secret and runs automatically
# on every MR and on main. It proves the production primitives
# (create_signed_tag.py + generate_release_manifest.py + verify_release_provenance.py)
# would create an annotated SIGNED tag, that lightweight and unsigned tags are
# rejected under --require-signed, that missing key material fails closed, that
# the release-tag guard refuses semver tags, and that nothing is pushed. Every
# tag it creates is non-semver, local-only, and deleted on exit. This dry-run is
# NOT a release and is NOT full signed-release closure.
release_signed_flow_dry_run:
  stage: validate
  image: python:3.12-alpine
  needs: []
  before_script:
    - apk add --no-cache git gnupg bash
  script:
    - bash scripts/release/release_dry_run.sh
  <<: *rules_mr_or_main
