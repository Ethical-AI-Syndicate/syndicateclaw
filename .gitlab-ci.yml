stages:
  - test
  - security
  - build
  - migrate

lint_and_test:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - ruff check src
    - mypy src --ignore-missing-imports
    - pytest tests/ -q --tb=line
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

quality_gate:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - ruff check src tests
    - mypy src
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

security_scan:
  stage: security
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
    - pip install bandit pip-audit
  script:
    - bandit -r src/ -ll -x tests
    - pip-audit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

docker_build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker info
  script:
    - docker build -t syndicateclaw:$CI_COMMIT_SHA .
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

migration_check:
  stage: migrate
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - |
      if [ -z "${SYNDICATECLAW_DATABASE_URL:-}" ]; then
        echo "SYNDICATECLAW_DATABASE_URL not set — skipping alembic check"
        exit 0
      fi
      python -m alembic check
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

runtime_contract_schemas:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
  script:
    - python -V
    - pip install -U pip
    - pip install -e ".[dev]"
    # Phase 1 quality gate for the isolated runtime slice.
    - ruff check src/syndicateclaw/runtime tests/runtime
    - mypy src/syndicateclaw/runtime
    # Regenerating schemas must not change committed artifacts (fail gate).
    - python -m syndicateclaw.runtime.contracts.export_schemas
    # Contract stability is defined as: schemas + runtime behavior for the Phase 1 slice.
    - pytest tests/runtime/ -q --tb=line
    - git diff --exit-code -- "src/syndicateclaw/runtime/contracts/jsonschema/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

integration_tests:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16
  variables:
    POSTGRES_USER: syndicateclaw
    POSTGRES_DB: syndicateclaw_test
    SYNDICATECLAW_DATABASE_URL: postgresql+asyncpg://syndicateclaw:${POSTGRES_PASSWORD}@postgres:5432/syndicateclaw_test
    SYNDICATECLAW_RBAC_ENFORCEMENT_ENABLED: "false"
  secrets:
    POSTGRES_PASSWORD:
      vault: ci/syndicateclaw/postgres_password@secret
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - pytest tests/ -m integration -q --tb=line
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

nightly_quality_debt:
  stage: test
  image: python:3.12-slim
  allow_failure: true
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
  script:
    - pip install -U pip
    - pip install -e ".[dev]"
    - export RUFF_EXIT=0
    - export MYPY_EXIT=0
    - ruff check src tests || export RUFF_EXIT=1
    - mypy src || export MYPY_EXIT=1
    - test "${RUFF_EXIT}" = "0" && test "${MYPY_EXIT}" = "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never
