stages:
  - test
  - security
  - build
  - migrate
  - deploy
  - smoke-test

# ─── Shared Variables ───────────────────────────────────
variables:
  REGISTRY: registry.mikeholownych.com
  IMAGE_BASE: registry.mikeholownych.com/ai-syndicate/syndicateclaw
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# ─── Test ────────────────────────────────────────────────
lint_and_test:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - ruff check src
    - mypy src --ignore-missing-imports
    - pytest tests/ -q --tb=line
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

security_scan:
  stage: security
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
    - pip install bandit pip-audit
  script:
    - bandit -r src/ -ll -x tests
    - pip-audit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─── Build & Push ───────────────────────────────────────
docker_build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t ${IMAGE_BASE}:${CI_COMMIT_SHA} .
    - docker tag ${IMAGE_BASE}:${CI_COMMIT_SHA} ${IMAGE_BASE}:${CI_COMMIT_BRANCH}
    - docker tag ${IMAGE_BASE}:${CI_COMMIT_SHA} ${IMAGE_BASE}:latest
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker push ${IMAGE_BASE}:${CI_COMMIT_SHA}
    - docker push ${IMAGE_BASE}:${CI_COMMIT_BRANCH}
    - docker push ${IMAGE_BASE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

docker_build_mr:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t ${IMAGE_BASE}:mr-${CI_MERGE_REQUEST_IID} .
    - docker tag ${IMAGE_BASE}:mr-${CI_MERGE_REQUEST_IID} ${IMAGE_BASE}:${CI_COMMIT_SHA}
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker push ${IMAGE_BASE}:mr-${CI_MERGE_REQUEST_IID}
    - docker push ${IMAGE_BASE}:${CI_COMMIT_SHA}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Migration Check ───────────────────────────────────
migration_check:
  stage: migrate
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install -U pip
    - pip install -e ".[dev]"
  script:
    - |
      if [ -z "${SYNDICATECLAW_DATABASE_URL:-}" ]; then
        echo "SYNDICATECLAW_DATABASE_URL not set — skipping alembic check"
        exit 0
      fi
      python -m alembic check
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─── Deploy to Environments ─────────────────────────────
deploy_dev:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: dev
    url: https://syndicateclaw-dev.${CI_PROJECT_NAME}.mikeholownych.com
    on_stop: teardown_dev
  script:
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker compose -f docker-compose.env.yml pull syndicateclaw-dev
    - docker compose -f docker-compose.env.yml up -d syndicateclaw-dev
    - docker compose -f docker-compose.env.yml exec syndicateclaw-dev alembic upgrade head
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

teardown_dev:
  stage: deploy
  image: docker:24
  environment:
    name: dev
    action: stop
  script:
    - docker compose -f docker-compose.env.yml down syndicateclaw-dev
  when: manual
  allow_failure: true

deploy_qa:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: qa
    url: https://syndicateclaw-qa.${CI_PROJECT_NAME}.mikeholownych.com
    on_stop: teardown_qa
  script:
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker compose -f docker-compose.env.yml pull syndicateclaw-qa
    - docker compose -f docker-compose.env.yml up -d syndicateclaw-qa
    - docker compose -f docker-compose.env.yml exec syndicateclaw-qa alembic upgrade head
    # Seed test data
    - docker compose -f docker-compose.env.yml exec syndicateclaw-qa python /scripts/seed-qa.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

teardown_qa:
  stage: deploy
  image: docker:24
  environment:
    name: qa
    action: stop
  script:
    - docker compose -f docker-compose.env.yml down syndicateclaw-qa
  when: manual
  allow_failure: true

deploy_perf:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: perf
    url: https://syndicateclaw-perf.${CI_PROJECT_NAME}.mikeholownych.com
    on_stop: teardown_perf
  script:
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker compose -f docker-compose.env.yml up -d syndicateclaw-perf
    - docker compose -f docker-compose.env.yml exec syndicateclaw-perf alembic upgrade head
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: manual

teardown_perf:
  stage: deploy
  image: docker:24
  environment:
    name: perf
    action: stop
  script:
    - docker compose -f docker-compose.env.yml down syndicateclaw-perf locust
  when: manual
  allow_failure: true

deploy_staging:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: staging
    url: https://syndicateclaw-staging.${CI_PROJECT_NAME}.mikeholownych.com
    on_stop: teardown_staging
  script:
    - docker login ${REGISTRY} -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
    - docker compose -f docker-compose.env.yml pull syndicateclaw-staging
    - docker compose -f docker-compose.env.yml up -d syndicateclaw-staging
    - docker compose -f docker-compose.env.yml exec syndicateclaw-staging alembic upgrade head
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - when: manual

teardown_staging:
  stage: deploy
  image: docker:24
  environment:
    name: staging
    action: stop
  script:
    - docker compose -f docker-compose.env.yml down syndicateclaw-staging
  when: manual
  allow_failure: true

# ─── Smoke Tests ────────────────────────────────────────
smoke_test_dev:
  stage: smoke-test
  image: curlimages/curl:latest
  script:
    - curl -sf http://syndicateclaw-dev:8000/healthz || exit 1
    - curl -sf http://syndicateclaw-dev:8000/api/v1/info || exit 1
    - echo "✅ Dev smoke test passed"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

smoke_test_staging:
  stage: smoke-test
  image: curlimages/curl:latest
  script:
    - curl -sf http://syndicateclaw-staging:8000/healthz || exit 1
    - curl -sf http://syndicateclaw-staging:8000/api/v1/info || exit 1
    - echo "✅ Staging smoke test passed"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ─── Runtime Contract ───────────────────────────────────
runtime_contract_schemas:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
  script:
    - python -V
    - pip install -U pip
    - pip install -e ".[dev]"
    - ruff check src/syndicateclaw/runtime tests/runtime
    - mypy src/syndicateclaw/runtime
    - python -m syndicateclaw.runtime.contracts.export_schemas
    - pytest tests/runtime/ -q --tb=line
    - git diff --exit-code -- "src/syndicateclaw/runtime/contracts/jsonschema/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─── Nightly Quality Debt ──────────────────────────────
nightly_quality_debt:
  stage: test
  image: python:3.12-slim
  allow_failure: true
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
  script:
    - pip install -U pip
    - pip install -e ".[dev]"
    - export RUFF_EXIT=0
    - export MYPY_EXIT=0
    - ruff check src tests || export RUFF_EXIT=1
    - mypy src || export MYPY_EXIT=1
    - test "${RUFF_EXIT}" = "0" && test "${MYPY_EXIT}" = "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never
